upstream api {
    server app:8000;
}

server {
    listen 80;
    server_name _;

    # Public endpoints proxied to FastAPI
    location / {
        proxy_pass http://api;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-Id $request_id;
        proxy_read_timeout 30s;
    }

    # Internal location used only by X-Accel-Redirect from FastAPI.
    # FastAPI authorises the download, then responds with
    #   X-Accel-Redirect: /_internal/extracts/<job_id>/result.csv
    # and nginx serves the file from the shared volume.
    location /_internal/extracts/ {
        internal;
        alias /var/lib/extracts/;
        # Stream large files efficiently
        sendfile on;
        tcp_nopush on;
    }
}
