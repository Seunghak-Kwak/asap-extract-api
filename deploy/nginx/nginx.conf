# Use Docker's embedded DNS so that `app` is re-resolved when the container
# restarts (otherwise nginx caches the first IP forever and 502s after a
# rebuild). The `set $up` indirection forces re-resolution; without it nginx
# treats the upstream as a literal at config-parse time.
server {
    listen 80;
    server_name _;

    resolver 127.0.0.11 valid=10s ipv6=off;

    location / {
        set $up http://app:8000;
        proxy_pass $up;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-Id $request_id;
        proxy_read_timeout 30s;
    }

    # Internal location used only by X-Accel-Redirect from FastAPI.
    # FastAPI authorises the download, then responds with
    #   X-Accel-Redirect: /_internal/extracts/<job_id>/result.csv
    # and nginx serves the file from the shared volume.
    location /_internal/extracts/ {
        internal;
        alias /var/lib/extracts/;
        sendfile on;
        tcp_nopush on;
    }
}
