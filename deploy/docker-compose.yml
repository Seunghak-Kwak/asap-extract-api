name: extract-api

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: extract
      POSTGRES_PASSWORD: extract
      POSTGRES_DB: extract_meta
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U extract -d extract_meta"]
      interval: 2s
      timeout: 3s
      retries: 30

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 3s
      retries: 30

  mysql:
    # Stand-in for the remote SingleStore. SingleStore speaks the MySQL wire
    # protocol; for local development we point SOURCE_* at this container.
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: warehouse
      MYSQL_USER: extract_ro
      MYSQL_PASSWORD: extract_ro
    volumes:
      - mysql-data:/var/lib/mysql
      - ./mysql-seed:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -proot"]
      interval: 3s
      timeout: 5s
      retries: 30

  app:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    env_file: ../.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mysql:
        condition: service_healthy
    volumes:
      - extract-data:/var/lib/extracts
    command: >
      sh -c "
        alembic upgrade head &&
        python -m app.bootstrap &&
        uvicorn app.main:app --host 0.0.0.0 --port 8000
      "

  worker:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    env_file: ../.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mysql:
        condition: service_healthy
    volumes:
      - extract-data:/var/lib/extracts
    command: arq app.workers.WorkerSettings

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - app
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - extract-data:/var/lib/extracts:ro
    ports:
      - "8080:80"

volumes:
  pg-data:
  mysql-data:
  extract-data:
